<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-layout">
    <div class="container page-grid">
      <section class="hero-panel">
        <div class="brand-bar">
          <div class="brand-badge" aria-hidden="true">
            <span>IG</span>
          </div>
          <p class="brand-text">Instagram</p>
        </div>

        <div class="hero-copy">
          <h1>See everyday moments from your <span>close friends</span>.</h1>
          <p>Share photos and videos with the people who matter most, and explore stories from friends in one place.</p>
        </div>

        <div class="photo-collage" aria-hidden="true">
          <div class="photo-card photo-card--back"></div>
          <div class="photo-card photo-card--middle"></div>
          <div class="photo-card photo-card--front"></div>
          <div class="collage-badge"></div>
        </div>
      </section>

      <section class="auth-panel">
        <div class="login-card">
          <h2>Log into Instagram</h2>
          <form>
            <label class="field">
              <input type="text" placeholder="Mobile number, username or email" />
            </label>
            <label class="field">
              <input type="password" placeholder="Password" />
            </label>
            <button type="submit" class="button button--primary">Log in</button>
          </form>

          <p class="forgot-link">Forgot password?</p>

          <div class="divider"><span>OR</span></div>

          <button class="button button--facebook" type="button">Log in with Facebook</button>
          <button class="button button--outline" type="button">Create new account</button>

          <p class="meta-brand"><span class="meta-icon" aria-hidden="true"></span>Meta</p>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
